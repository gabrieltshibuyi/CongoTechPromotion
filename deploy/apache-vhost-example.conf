<VirtualHost *:80>
    ServerName congotechpromotion.local
    DocumentRoot "c:/wamp64/www/CongoTechPromotion/public"

    <Directory "c:/wamp64/www/CongoTechPromotion/public">
        AllowOverride All
        Require all granted
        Options Indexes FollowSymLinks
    </Directory>

    ErrorLog "c:/wamp64/logs/congotechpromotion-error.log"
    CustomLog "c:/wamp64/logs/congotechpromotion-access.log" combined
</VirtualHost>
